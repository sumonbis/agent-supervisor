        S3: { area: "S3", score: 0, reasoning: "No test files found in the repository.", detail: { hasTests: false, testRatio: 0 } },

      }
    };
  </script>
  <script src="../media/dashboard.js"></script>
  <script>
    window.dispatchEvent(new MessageEvent("message", { data: { type: "report", report: REPORT } }));
